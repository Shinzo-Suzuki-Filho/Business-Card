<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartão de Visita Digital</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section
        class="business-card"
        role="region"
        aria-label="Cartão de visita digital"
      >
        <header>
          <div class="logo-container">
            <img
              src="./src/img/Logo-CriArtWeb.png"
              alt="Logo da CriArtWeb"
              class="logo"
              width="120"
              height="120"
            />
          </div>
          <h1 class="name">Shinzo Suzuki</h1>
          <h2 class="title">Desenvolvedor Web Front-End</h2>
        </header>
        <ul class="contact-list">
          <li>
            <a
              href="tel:+5582988886434"
              class="contact-link"
              aria-label="Ligar para Shinzo Suzuki"
            >
              <i class="fas fa-phone-alt" aria-hidden="true"></i>
              <span>+55 (82) 98888-6434</span>
            </a>
          </li>
          <li>
            <a
              href="mailto:agencia.criartweb@gmail.com"
              class="contact-link"
              aria-label="Enviar e-mail para Shinzo Suzuki"
              id="email-link"
            >
              <i class="fas fa-envelope" aria-hidden="true"></i>
              <span>agencia.criartweb@gmail.com</span>
            </a>
          </li>
        </ul>
        <div class="company-name" aria-label="Nome da empresa">CriArtweb</div>
        <nav class="social-links" aria-label="Redes sociais">
          <a
            href="https://instagram.com//agencia.criartweb/"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link instagram"
            aria-label="Instagram da criartweb"
            id="instagram-link"
          >
            <i class="fab fa-instagram" aria-hidden="true"></i>
          </a>
          <a
            href="https://wa.me/5582988886434"
            class="social-link whatsapp"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="WhatsApp da CriArtWeb"
            id="whatsapp-link"
          >
            <i class="fab fa-whatsapp" aria-hidden="true"></i>
          </a>
        </nav>
        <button
          id="copy-contact"
          type="button"
          aria-label="Copiar todas as informações de contato"
        >
          <i class="fas fa-copy" aria-hidden="true"></i> Copiar Contato
        </button>
        <div
          id="copy-message"
          role="status"
          aria-live="polite"
          class="copy-message"
          hidden
        >
          Contato copiado!
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
